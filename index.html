const SMETA = {"fmkorea": ["fmkorea", "#ea580c"], "theqoo": ["theqoo", "#7c3aed"], "twitter": ["트위터", "#0ea5e9"], "daum_cafe": ["다음카페", "#16a34a"], "youtube": ["유튜브", "#dc2626"], "news": ["뉴스", "#2563eb"]};
let mode='live', dayIdx=0, off=new Set();   // off = 숨긴 소스

const LIVE_DAYS = 7;
const dkey = s => (s||'').slice(0,10);
const effDate = d => ((d.published||'').slice(0,10)) || ((d.first_seen||'').slice(0,10));
function cutoff(n){ const t=new Date(); t.setDate(t.getDate()-n);
  return t.toISOString().slice(0,10); }
const days = [...new Set(DATA.map(d=>effDate(d)).filter(Boolean))].sort().reverse();

function srcLabel(s){return (SMETA[s]||[s,'#888'])[0];}
function srcColor(s){return (SMETA[s]||[s,'#888'])[1];}

function buildFilters(){
  const f=document.getElementById('filters'); f.innerHTML='';
  const srcs=[...new Set(DATA.map(d=>d.source))];
  srcs.forEach(s=>{
    const c=document.createElement('span'); c.className='chip on';
    c.style.background=srcColor(s); c.style.borderColor=srcColor(s);
    c.textContent=srcLabel(s);
    c.onclick=()=>{ if(off.has(s)){off.delete(s);c.className='chip on';c.style.background=srcColor(s);c.style.color='#fff';}
                    else{off.add(s);c.className='chip';c.style.background='#fff';c.style.color='#a1a1aa';} render(); };
    f.appendChild(c);
  });
}

function effTS(d){ return d.published || d.first_seen || ''; }
function timeStr(d){
  const s = d.published || d.first_seen || '';
  const dm = s.slice(5,10);                       // MM-DD
  const tm = s.length>=16 ? ' '+s.slice(11,16) : '';  // HH:MM (있으면)
  return dm+tm;
}

function itemHTML(d){
  const col=srcColor(d.source);
  const board=d.board?` <span class="board">· ${esc(d.board)}</span>`:'';
  return `<div class="item">
    <span class="badge" style="background:${col}">${srcLabel(d.source)}</span>
    <div><a href="${d.url}" target="_blank">${esc(d.title)}</a>${board}</div>
    <span class="meta">${timeStr(d)}</span></div>`;
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function render(){
  const v=document.getElementById('view');
  let rows = DATA.filter(d=>!off.has(d.source));
  if(mode==='live'){
    const cut=cutoff(LIVE_DAYS);
    rows=rows.filter(d=>effDate(d) >= cut);   // 최근 1주일만
  } else if(mode==='daily'){
    const day=days[dayIdx];
    rows=rows.filter(d=>effDate(d)===day);   // 그날 올라온 글만(작성일)
    document.getElementById('navcnt').textContent=`${rows.length}건`;
  }
  if(!rows.length){v.innerHTML='<div class="empty">표시할 항목이 없습니다.</div>';return;}
  // 시간순 정렬 (최신이 제일 위로)
  rows.sort((a,b)=> effTS(b).localeCompare(effTS(a)));
  v.innerHTML = rows.map(itemHTML).join('');
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  document.getElementById('dailyNav').style.display = m==='daily'?'flex':'none';
  if(m==='daily') fillDates();
  render();
}
function fillDates(){
  const sel=document.getElementById('datesel'); sel.innerHTML='';
  days.forEach((d,i)=>{const o=document.createElement('option');o.value=i;o.textContent=d;sel.appendChild(o);});
  sel.value=dayIdx; updateNav();
}
function updateNav(){
  document.getElementById('prev').disabled = dayIdx>=days.length-1;
  document.getElementById('next').disabled = dayIdx<=0;
  document.getElementById('datesel').value=dayIdx;
}
function move(dir){ // dir +1 = 다음날(더 최근), -1 = 이전날
  dayIdx -= dir; if(dayIdx<0)dayIdx=0; if(dayIdx>days.length-1)dayIdx=days.length-1;
  updateNav(); render();
}
function jump(i){ dayIdx=+i; updateNav(); render(); }

buildFilters(); render();
</script></body></html>
