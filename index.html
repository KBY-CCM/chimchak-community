  const board=d.board?` <span class="board">· ${esc(d.board)}</span>`:'';
  return `<div class="item">
    <span class="badge" style="background:${col}">${srcLabel(d.source)}</span>
    <div><a href="${d.url}" target="_blank">${esc(d.title)}</a>${board}</div>
    <span class="meta">${timeStr(d)}</span></div>`;
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function render(){
  const v=document.getElementById('view');
  let rows = DATA.filter(d=>!off.has(d.source));
  if(mode==='live'){
    const cut=cutoff(LIVE_DAYS);
    rows=rows.filter(d=>effDate(d) >= cut);   // 최근 1주일만
  } else if(mode==='daily'){
    const day=days[dayIdx];
    rows=rows.filter(d=>effDate(d)===day);   // 그날 올라온 글만(작성일)
    document.getElementById('navcnt').textContent=`${rows.length}건`;
  }
  if(!rows.length){v.innerHTML='<div class="empty">표시할 항목이 없습니다.</div>';return;}
  // 시간순 정렬 (최신이 제일 위로)
  rows.sort((a,b)=> effTS(b).localeCompare(effTS(a)));
  v.innerHTML = rows.map(itemHTML).join('');
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  document.getElementById('dailyNav').style.display = m==='daily'?'flex':'none';
  if(m==='daily') fillDates();
  render();
}
function fillDates(){
  const sel=document.getElementById('datesel'); sel.innerHTML='';
  days.forEach((d,i)=>{const o=document.createElement('option');o.value=i;o.textContent=d;sel.appendChild(o);});
  sel.value=dayIdx; updateNav();
}
function updateNav(){
  document.getElementById('prev').disabled = dayIdx>=days.length-1;
  document.getElementById('next').disabled = dayIdx<=0;
  document.getElementById('datesel').value=dayIdx;
}
function move(dir){ // dir +1 = 다음날(더 최근), -1 = 이전날
  dayIdx -= dir; if(dayIdx<0)dayIdx=0; if(dayIdx>days.length-1)dayIdx=days.length-1;
  updateNav(); render();
}
function jump(i){ dayIdx=+i; updateNav(); render(); }

buildFilters(); render();
</script></body></html>
